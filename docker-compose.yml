version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: claw-agent
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on: []